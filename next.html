        const inner = document.querySelector('.carousel-inner');
        const src = thumb.replace(/\/\d+px/, '/1920px');
        inner.innerHTML += `
              <div class="carousel-item w-100 h-100" data-title="${title}">
                <img src="${src}" class="img-fluid d-block mx-auto my-auto" style="max-width: 100vw; max-height:100vh" />
                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded-3">
                  <h5>${title}</h5>
                  <p>...</p>
                </div>
              </div>
              `;
      }
      document.querySelector('.carousel-inner > .carousel-item').classList.add('active');
      const carousel = new bootstrap.Carousel('#carouselMediawiki');
      document
        .querySelector('#carouselMediawiki')
        .addEventListener('slide.bs.carousel', async event => {
          /** @type HTMLElement */
          const relatedTarget = event.relatedTarget;
          const title = relatedTarget.dataset.title;
          const query = new URLSearchParams({
            origin: '*',
            action: 'query',
            format: 'json',
            formatversion: '2',
            prop: 'imageinfo',
            titles: 'File:' + title,
            iiprop: 'timestamp|url|size|mime|mediatype|extmetadata',
            iiextmetadatafilter:
              'DateTime|DateTimeOriginal|ObjectName|ImageDescription|License|LicenseShortName|UsageTerms|LicenseUrl|Credit|Artist|AuthorCount|GPSLatitude|GPSLongitude|Permission|Attribution|AttributionRequired|NonFree|Restrictions|DeletionReason',
            iiextmetadatalanguage: 'en',
            uselang: 'content',
            smaxage: '300',
            maxage: '300'
          });
          const url = new URL('https://en.wikipedia.org/w/api.php?' + query);
          const res = await fetch(url);
          const json = await res.json();
          const imageinfo = json.query.pages[0].imageinfo[0];
          const extmetadata = imageinfo.extmetadata;
          // let caption = `<ul class="list-inline">`;
          // for (const [key, { value }] of Object.entries(extmetadata)) {
          //   caption += `<li class="list-inline-item"><strong>${key}:</strong> ${value}</li>`;
          // }
          let caption = `<dl class="row">`;
          for (const [key, {value}] of Object.entries(extmetadata)) {
            caption += `<dt class="col-sm-3 text-end">${key}</dt><dd class="col-sm-9 text-start">${value}</dd>`;
          }
          caption += `</dl>`;
          relatedTarget.querySelector('.carousel-caption > p').innerHTML = caption;

          // relatedTarget.querySelector(".carousel-caption > p").innerHTML =
